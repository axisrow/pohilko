  <link rel="preload" as="image" href="assets/hero-sculpture-mobile.webp" media="(max-width: 920px)">

<body>
  <header class="site-header">
    <div class="header-inner container">
      <a class="brand" id="brand-link" href="#top" aria-label="Скульптура в золоте">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" fill="none" role="img">
            <path d="M16 4c4.5 4.4 4.6 9.2.3 14.5-2.3-3.8-2.4-8.6-.3-14.5Z" stroke="currentColor" stroke-width="1.7"/>
            <path d="M8.5 9.5c4.9 1.2 7.6 4.6 8 10.3-3.9-1-6.6-4.4-8-10.3Z" stroke="currentColor" stroke-width="1.7"/>
            <path d="M23.7 9.5c-4.9 1.2-7.6 4.6-8 10.3 4-1 6.6-4.4 8-10.3Z" stroke="currentColor" stroke-width="1.7"/>
            <path d="M7 22.6c5.8-1.5 12.2-1.5 18 0" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="brand-text">
          <span class="brand-title" id="brand-title">Скульптура в золоте</span>
          <span class="brand-note" id="brand-note">Chocolate atelier</span>
        </span>
      </a>

      <nav class="site-nav" id="primary-nav" aria-label="Основная навигация"></nav>

      <div class="header-actions">
        <div class="locale-menu header-locale-menu" id="header-locale-menu" data-locale-menu></div>
        <a class="button header-cta" id="header-cta" href="#request">Запросить работу</a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav" aria-label="Открыть меню">
          <svg class="icon-burger" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M3 6.5h18M3 12h18M3 17.5h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <svg class="icon-close" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M5.5 5.5l13 13M18.5 5.5l-13 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main id="top">
    <section class="hero" aria-labelledby="hero-title">
      <div class="hero-inner container">
        <div class="hero-copy">
          <p class="eyebrow" id="hero-eyebrow"></p>
          <h1 id="hero-title"></h1>
          <p class="hero-text" id="hero-text"></p>
          <div class="hero-actions" id="hero-actions"></div>
          <div class="hero-proof" id="hero-proof" aria-label=""></div>
        </div>
      </div>
    </section>

    <section class="statement" id="statement" aria-label="">
      <div class="statement-inner container-narrow">
        <p id="statement-text"></p>
      </div>
    </section>

    <section class="section container" id="process" aria-labelledby="process-title">
      <div class="section-heading">
        <div>
          <p class="eyebrow" id="process-eyebrow"></p>
          <h2 id="process-title"></h2>
        </div>
        <p id="process-text"></p>
      </div>

      <div class="process-grid card-grid card-grid--shadow" id="process-grid"></div>
    </section>

    <section class="gold-band" id="gold" aria-labelledby="gold-title">
      <div class="gold-inner container">
        <div class="gold-copy">
          <p class="eyebrow" id="gold-eyebrow"></p>
          <h2 id="gold-title"></h2>
          <p class="copy-text" id="gold-text"></p>
          <div class="section-actions" id="gold-actions"></div>
        </div>
      </div>
    </section>

    <section class="section container" id="collection" aria-labelledby="collection-title">
      <div class="collection">
        <div class="collection-visual" aria-hidden="true">
          <img class="collection-cutout" src="assets/sculpture-cutout.webp" alt="">
        </div>
        <div class="collection-copy">
          <p class="eyebrow" id="collection-eyebrow"></p>
          <h2 id="collection-title"></h2>
          <p class="copy-text copy-text-loose" id="collection-text"></p>
          <div class="metrics card-grid" id="metrics-grid" aria-label=""></div>
        </div>
      </div>
    </section>

    <section class="section container" id="gallery" aria-labelledby="gallery-title">
      <div class="section-heading">
        <div>
          <p class="eyebrow" id="gallery-eyebrow"></p>
          <h2 id="gallery-title"></h2>
        </div>
        <p id="gallery-text"></p>
      </div>

      <div class="gallery-grid card-grid card-grid--shadow" id="gallery-grid"></div>
    </section>

    <section class="request" id="request" aria-labelledby="request-title">
      <div class="request-inner container">
        <div class="request-copy">
          <p class="eyebrow" id="request-eyebrow"></p>
          <h2 id="request-title"></h2>
          <p class="copy-text copy-text-loose" id="request-text"></p>
        </div>

        <form class="request-form" id="request-form" novalidate></form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner container">
      <span id="footer-copyright"></span>
      <nav class="footer-links" id="footer-nav" aria-label="Разделы сайта"></nav>
    </div>
  </footer>

  <template id="nav-link-template">
    <a></a>
  </template>

  <template id="action-button-template">
    <a class="button"></a>
  </template>

  <template id="process-card-template">
    <article class="media-card process-item">
      <div class="media-frame media-frame--process">
        <img loading="lazy" alt="">
      </div>
      <div class="process-body">
        <p class="process-kicker"></p>
        <h3></h3>
        <p class="process-copy"></p>
      </div>
    </article>
  </template>

  <template id="metric-template">
    <div class="metric">
      <strong></strong>
      <span></span>
    </div>
  </template>

  <template id="gallery-card-template">
    <figure class="media-card gallery-item">
      <div class="media-frame media-frame--square">
        <img width="960" height="960" loading="lazy" decoding="async" alt="">
      </div>
      <figcaption></figcaption>
    </figure>
  </template>

  <template id="form-field-template">
    <div class="field">
      <label></label>
      <input>
      <textarea></textarea>
      <span class="field-error"></span>
    </div>
  </template>
</body>
</html>
